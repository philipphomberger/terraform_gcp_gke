services:
  # ---- Go Backend ----
  server:
    build: .
    ports:
      - "8088:8088"
    env_file:
      - .env
    environment:
      - HOMBOX_PORT=8088
      - DATABASE_URL=postgres://hombox:hombox@db:5432/hombox?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=hombox-files
      - S3_DERIVATIVES_BUCKET=hombox-derivatives
      - S3_USE_SSL=false
      - SESSION_SECRET=dev-secret-change-in-production-abcdef1234567890
      - WEBAUTHN_RP_ID=localhost
      - WEBAUTHN_RP_ORIGIN=http://localhost:8080
      - WEBAUTHN_RP_DISPLAY_NAME=Hombox
      - OIDC_PROVIDERS=google
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---- PostgreSQL ----
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hombox
      POSTGRES_PASSWORD: hombox
      POSTGRES_DB: hombox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hombox"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- MinIO (S3-compatible storage) ----
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- MinIO bucket provisioning (one-shot) ----
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/hombox-files;
      mc mb --ignore-existing local/hombox-derivatives;
      mc anonymous set private local/hombox-files;
      mc anonymous set private local/hombox-derivatives;
      echo 'MinIO buckets ready';
      "

volumes:
  pgdata:
  miniodata:
